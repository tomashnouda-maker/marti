<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المدير - التحكم الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f6f9; }
        .action-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .action-card:hover { transform: translateY(-5px); border-color: #2563eb; }
        .active-mode { display: block !important; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <div id="loader" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center hidden">
        <div class="loader rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-700 flex items-center gap-2">
                <span class="bg-blue-600 text-white p-2 rounded-lg text-sm">ADMIN</span>
                لوحة تحكم المدير
            </h1>
            <div class="flex items-center gap-4">
                <select id="class-select" onchange="onClassChange()" class="bg-gray-100 border-2 border-gray-200 rounded-xl px-4 py-2 font-bold text-blue-800 outline-none focus:border-blue-500">
                    <option value="">-- اختر الفصل أولاً --</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-6 mt-4">
        
        <!-- Welcome Screen -->
        <div id="welcome-msg" class="text-center py-20 bg-white rounded-[2.5rem] shadow-sm border border-dashed border-gray-300">
            <div class="text-6xl mb-4">🏫</div>
            <h2 class="text-2xl font-bold text-gray-400">يرجى اختيار فصل من القائمة بالأعلى للبدء</h2>
        </div>

        <!-- Main Action Buttons (Hidden until class selected) -->
        <div id="main-actions" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <button onclick="setMode('attendance')" class="action-card bg-white p-8 rounded-[2rem] shadow-lg flex flex-col items-center text-center">
                <div class="text-5xl mb-4 text-green-500">📅</div>
                <h3 class="text-xl font-black">أخذ الغياب والحضور</h3>
                <p class="text-sm text-gray-400 mt-2">تسجيل حالة حضور الطلاب لتاريخ اليوم</p>
            </button>
            <button onclick="setMode('exams')" class="action-card bg-white p-8 rounded-[2rem] shadow-lg flex flex-col items-center text-center">
                <div class="text-5xl mb-4 text-orange-500">📝</div>
                <h3 class="text-xl font-black">إضافة درجات امتحان جديد</h3>
                <p class="text-sm text-gray-400 mt-2">رصد درجات اختبار أو تقييم جديد للفصل</p>
            </button>
        </div>

        <!-- Mode: Attendance -->
        <div id="mode-attendance" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-md border-r-8 border-green-500">
                <h2 class="text-xl font-bold">رصد الحضور - بتاريخ اليوم</h2>
                <button onclick="backToMain()" class="text-gray-400 font-bold">⬅️ العودة</button>
            </div>
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">اسم الطالب</th>
                            <th class="p-4 text-center">الحالة</th>
                            <th class="p-4">التوقيت</th>
                        </tr>
                    </thead>
                    <tbody id="att-list" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>

        <!-- Mode: Exams -->
        <div id="mode-exams" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-md border-r-8 border-orange-500 space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold">رصد درجات امتحان جديد</h2>
                    <button onclick="backToMain()" class="text-gray-400 font-bold">⬅️ العودة</button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-2">اسم الامتحان</label>
                        <input type="text" id="exam-name" placeholder="مثلاً: امتحان شهر أكتوبر" class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-400 p-4 rounded-2xl outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-500 mb-2">الدرجة النهائية</label>
                        <input type="number" id="exam-max" value="100" class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-400 p-4 rounded-2xl outline-none transition-all text-center">
                    </div>
                </div>
                
                <div class="pt-4 border-t">
                    <p class="text-sm text-gray-400 mb-4 font-bold">أدخل درجات الطلاب بالأسفل ثم اضغط حفظ النهائي:</p>
                    <div class="bg-gray-50 rounded-2xl overflow-hidden">
                        <table class="w-full text-right">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-4">اسم الطالب</th>
                                    <th class="p-4 text-center">الدرجة</th>
                                </tr>
                            </thead>
                            <tbody id="exam-list" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <button onclick="saveExamsAction()" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl shadow-orange-100 hover:bg-orange-700 transition-all">
                    🚀 حفظ درجات الامتحان للجميع
                </button>
            </div>
        </div>

        <!-- System Settings (Add/Import) -->
        <div class="mt-20 border-t pt-10">
            <button onclick="toggleSettings()" class="text-blue-600 font-bold flex items-center gap-2 mb-6">⚙️ إعدادات الفصل والطلاب</button>
            <div id="settings-area" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 pb-20">
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h4 class="font-bold mb-4">إنشاء فصل جديد</h4>
                    <div class="flex gap-2">
                        <input type="text" id="new-class" placeholder="اسم الفصل..." class="flex-1 bg-gray-50 p-3 rounded-xl border outline-none">
                        <button onclick="addClass()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">إضافة</button>
                    </div>
                </div>
                <div class="bg-blue-900 p-6 rounded-2xl shadow-sm text-white text-center">
                    <h4 class="font-bold mb-4">رفع كشف الفصل (Excel)</h4>
                    <input type="file" id="excel-in" class="hidden" accept=".xlsx, .xls">
                    <button onclick="document.getElementById('excel-in').click()" class="bg-white text-blue-900 px-8 py-3 rounded-xl font-bold">اختيار ملف</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://tomas-f73e9-default-rtdb.europe-west1.firebasedatabase.app/";
        let currentClass = "";

        async function firebase(path, method = 'GET', data = null) {
            document.getElementById('loader').classList.remove('hidden');
            const res = await fetch(`${API_URL}${path}.json`, {
                method, body: data ? JSON.stringify(data) : null,
                headers: { 'Content-Type': 'application/json' }
            });
            const json = await res.json();
            document.getElementById('loader').classList.add('hidden');
            return json;
        }

        async function init() {
            const classes = await firebase('classes');
            const sel = document.getElementById('class-select');
            if(classes) Object.keys(classes).forEach(c => {
                const o = document.createElement('option');
                o.value = c; o.innerText = c; sel.appendChild(o);
            });
        }

        function onClassChange() {
            currentClass = document.getElementById('class-select').value;
            if(currentClass) {
                document.getElementById('welcome-msg').classList.add('hidden');
                document.getElementById('main-actions').classList.remove('hidden');
                backToMain();
            } else {
                document.getElementById('welcome-msg').classList.remove('hidden');
                document.getElementById('main-actions').classList.add('hidden');
            }
        }

        function setMode(mode) {
            document.getElementById('main-actions').classList.add('hidden');
            document.getElementById('mode-attendance').classList.add('hidden');
            document.getElementById('mode-exams').classList.add('hidden');
            
            document.getElementById(`mode-${mode}`).classList.add('active-mode');
            
            if(mode === 'attendance') loadAttendance();
            if(mode === 'exams') loadExams();
        }

        function backToMain() {
            document.getElementById('main-actions').classList.remove('hidden');
            document.getElementById('mode-attendance').classList.remove('active-mode');
            document.getElementById('mode-attendance').classList.add('hidden');
            document.getElementById('mode-exams').classList.remove('active-mode');
            document.getElementById('mode-exams').classList.add('hidden');
        }

        async function loadAttendance() {
            const students = await firebase(`students/${currentClass}`);
            const list = document.getElementById('att-list');
            list.innerHTML = "";
            if(!students) return;

            Object.entries(students).forEach(([id, s]) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-700">${s.name}</td>
                    <td class="p-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="markAtt('${id}', 'حاضر')" class="bg-green-500 text-white px-4 py-1 rounded-lg text-sm font-bold">حضور</button>
                            <button onclick="markAtt('${id}', 'غائب')" class="bg-red-500 text-white px-4 py-1 rounded-lg text-sm font-bold">غياب</button>
                        </div>
                    </td>
                    <td id="stat-${id}" class="p-4 text-xs font-bold text-gray-400">${s.lastStatus || 'لم يسجل'}</td>
                `;
                list.appendChild(tr);
            });
        }

        async function markAtt(id, status) {
            const time = new Date().toLocaleString('ar-EG');
            await firebase(`logs/${currentClass}/${id}`, 'POST', { status, time, date: new Date().toISOString().split('T')[0] });
            await firebase(`students/${currentClass}/${id}/lastStatus`, 'PUT', `${status} - ${time}`);
            document.getElementById(`stat-${id}`).innerText = `${status} - ${time}`;
        }

        async function loadExams() {
            const students = await firebase(`students/${currentClass}`);
            const list = document.getElementById('exam-list');
            list.innerHTML = "";
            if(!students) return;

            Object.entries(students).forEach(([id, s]) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-600">${s.name}</td>
                    <td class="p-4">
                        <input type="number" data-sid="${id}" class="exam-val w-full bg-white border-2 border-gray-100 rounded-xl p-3 text-center font-black text-blue-600 outline-none focus:border-orange-500" placeholder="0">
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function saveExamsAction() {
            const name = document.getElementById('exam-name').value.trim();
            const max = document.getElementById('exam-max').value;
            if(!name) return alert("يرجى كتابة اسم الامتحان أولاً");

            const inputs = document.querySelectorAll('.exam-val');
            for(let i of inputs) {
                const sid = i.dataset.sid;
                const score = i.value || 0;
                await firebase(`exams/${currentClass}/${sid}`, 'POST', { title: name, score, total: max, date: new Date().toLocaleDateString('ar-EG') });
                await firebase(`students/${currentClass}/${sid}/lastGrade`, 'PUT', `${score} / ${max}`);
            }
            alert("تم حفظ درجات الامتحان بنجاح ✅");
            backToMain();
        }

        // Settings / Management
        function toggleSettings() {
            document.getElementById('settings-area').classList.toggle('hidden');
        }

        async function addClass() {
            const n = document.getElementById('new-class').value.trim();
            if(!n) return;
            await firebase(`classes/${n}`, 'PUT', { created: Date.now() });
            location.reload();
        }

        document.getElementById('excel-in').addEventListener('change', function(e) {
            if(!currentClass) return alert("اختر الفصل أولاً");
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const data = new Uint8Array(evt.target.result);
                const book = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(book.Sheets[book.SheetNames[0]]);
                for(let r of rows) {
                    const n = r['الأسم'] || r['الاسم'] || r['Name'];
                    if(n) await firebase(`students/${currentClass}`, 'POST', { name: n, code: 'T'+Math.floor(Math.random()*90000+10000) });
                }
                alert("تم استيراد الطلاب بنجاح");
                onClassChange();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        window.onload = init;
    </script>
</body>
</html>
